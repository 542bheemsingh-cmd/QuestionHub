<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Read and reply to a QuestionHub discussion in real time.">
  <title>Question | QuestionHub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script src="https://unpkg.com/lucide@latest" defer></script>
  <script type="module" src="js/app.js"></script>
</head>
<body data-page="question">
  <canvas id="particle-canvas" aria-hidden="true"></canvas>
  <div class="mouse-glow" aria-hidden="true"></div>
  <header class="site-header">
    <nav class="navbar" aria-label="Primary navigation">
      <a class="brand" href="index.html"><span>Q</span>QuestionHub</a>
      <button class="nav-toggle" type="button" aria-label="Open menu" aria-expanded="false"><i data-lucide="Menu"></i></button>
      <div class="nav-links">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="ask.html">Ask</a>
        <a class="nav-link" href="profile.html" data-profile-link hidden>Profile</a>
        <a class="nav-link" href="login.html" data-guest-visible>Login</a>
      </div>
    </nav>
  </header>
  <main class="discussion-layout">
    <section id="question-detail" class="question-detail">
      <article class="detail-card skeleton-card">
        <div class="skeleton-line wide"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line short"></div>
      </article>
    </section>
    <aside class="reply-panel glass-panel">
      <h2>Replies</h2>
      <form id="reply-form" class="stacked-form">
        <label>Your reply<textarea name="body" rows="5" required placeholder="Add a useful answer, source, example, or question."></textarea></label>
        <label class="file-drop small"><i data-lucide="ImagePlus"></i><span>Attach image</span><input name="image" type="file" accept="image/*"></label>
        <button class="btn primary" type="submit">Post reply</button>
      </form>
      <div id="reply-list" class="reply-list"></div>
    </aside>
  </main>
  <div class="toast-stack" aria-live="polite"></div>
</body>
</html>
