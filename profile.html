<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="QuestionHub user profile with bookmarks and account controls.">
  <title>Profile | QuestionHub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script src="https://unpkg.com/lucide@latest" defer></script>
  <script type="module" src="js/app.js"></script>
</head>
<body data-page="profile">
  <canvas id="particle-canvas" aria-hidden="true"></canvas>
  <div class="mouse-glow" aria-hidden="true"></div>
  <header class="site-header">
    <nav class="navbar" aria-label="Primary navigation">
      <a class="brand" href="index.html"><span>Q</span>QuestionHub</a>
      <button class="nav-toggle" type="button" aria-label="Open menu" aria-expanded="false"><i data-lucide="Menu"></i></button>
      <div class="nav-links">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="ask.html">Ask</a>
        <a class="nav-link" href="profile.html" data-profile-link hidden>Profile</a>
        <a class="nav-link" href="login.html" data-guest-visible>Login</a>
      </div>
    </nav>
  </header>
  <main class="profile-main">
    <section id="profile-panel" class="profile-panel glass-panel"></section>
    <section class="content-section saved-section">
      <div class="section-heading">
        <p class="eyebrow">Vault</p>
        <h2>Saved questions</h2>
      </div>
      <div id="saved-list"></div>
    </section>
  </main>
  <div class="toast-stack" aria-live="polite"></div>
</body>
</html>
