<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Ask a live QuestionHub community question with category, tags, and image upload.">
  <title>Ask | QuestionHub</title>
  <link rel="stylesheet" href="css/style.css?v=ask2">
  <link rel="stylesheet" href="css/animations.css?v=ask2">
  <link rel="stylesheet" href="css/responsive.css?v=ask2">
  <script src="https://unpkg.com/lucide@latest" defer></script>
  <script type="module" src="js/app.js?v=ask2"></script>
</head>
<body data-page="ask">
  <canvas id="particle-canvas" aria-hidden="true"></canvas>
  <div class="mouse-glow" aria-hidden="true"></div>
  <header class="site-header">
    <nav class="navbar" aria-label="Primary navigation">
      <a class="brand" href="index.html"><span>Q</span>QuestionHub</a>
      <button class="nav-toggle" type="button" aria-label="Open menu" aria-expanded="false"><i data-lucide="Menu"></i></button>
      <div class="nav-links">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="ask.html">Ask</a>
        <a class="nav-link" href="profile.html" data-profile-link hidden>Profile</a>
        <a class="nav-link" href="login.html" data-guest-visible>Login</a>
      </div>
    </nav>
  </header>
  <main class="narrow-main">
    <section class="form-shell glass-panel">
      <p class="eyebrow">Start a discussion</p>
      <h1>Ask the community</h1>
      <div class="firebase-status" id="firebase-status">
        <i data-lucide="LoaderCircle"></i>
        <span>Checking Firebase connection...</span>
      </div>
      <form id="ask-form" class="stacked-form">
        <label>Question title<input name="title" type="text" maxlength="140" required placeholder="What are you trying to figure out?"></label>
        <label>Description<textarea name="description" rows="8" required placeholder="Add context, what you tried, and what kind of answer would help."></textarea></label>
        <div class="form-grid">
          <label>Category
            <input id="category" name="category" type="hidden" required value="Gaming">
            <div class="custom-select" data-category-select>
              <button class="custom-select-trigger" type="button" aria-expanded="false">
                <span data-category-current>Gaming</span>
                <i data-lucide="ChevronDown"></i>
              </button>
              <div class="custom-select-menu" data-category-menu></div>
            </div>
          </label>
          <label>Tags<input name="tags" type="text" placeholder="firebase, ai, setup"></label>
        </div>
        <label class="file-drop"><i data-lucide="ImagePlus"></i><span>Upload question image</span><input name="image" type="file" accept="image/*"></label>
        <button class="btn primary" type="submit"><i data-lucide="Send"></i>Publish question</button>
      </form>
    </section>
  </main>
  <div class="toast-stack" aria-live="polite"></div>
</body>
</html>
