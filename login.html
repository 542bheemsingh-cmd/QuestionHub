<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Login or register for QuestionHub with Google or email/password Firebase Authentication.">
  <title>Login | QuestionHub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script src="https://unpkg.com/lucide@latest" defer></script>
  <script type="module">
    import { initPageChrome } from "./js/ui.js";
    import { initAuthPage } from "./js/auth.js";
    initPageChrome();
    initAuthPage();
  </script>
</head>
<body data-auth-mode="login">
  <canvas id="particle-canvas" aria-hidden="true"></canvas>
  <div class="mouse-glow" aria-hidden="true"></div>
  <main class="auth-main">
    <section class="auth-card glass-panel">
      <a class="brand centered" href="index.html"><span>Q</span>QuestionHub</a>
      <div class="auth-tabs">
        <button type="button" data-auth-switch="login">Login</button>
        <button type="button" data-auth-switch="register">Register</button>
      </div>
      <button class="btn ghost full" id="google-login" type="button"><i data-lucide="Chrome"></i>Continue with Google</button>
      <form id="login-form" class="stacked-form auth-login">
        <label>Email<input name="email" type="email" required autocomplete="email"></label>
        <label>Password<input name="password" type="password" required autocomplete="current-password"></label>
        <button class="btn primary" type="submit">Login</button>
      </form>
      <form id="register-form" class="stacked-form auth-register">
        <label>Name<input name="name" type="text" required autocomplete="name"></label>
        <label>Email<input name="email" type="email" required autocomplete="email"></label>
        <label>Password<input name="password" type="password" minlength="6" required autocomplete="new-password"></label>
        <button class="btn primary" type="submit">Create account</button>
      </form>
    </section>
  </main>
  <div class="toast-stack" aria-live="polite"></div>
</body>
</html>
